<!DOCTYPE html>
<html>
<head>
<title>JhatpatKart</title>
<style>
body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
}

header{
background:#00b14f;
color:white;
padding:20px;
}

.products{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
width:150px;
}

button{
background:#00b14f;
color:white;
border:none;
padding:10px;
border-radius:5px;
}
</style>
</head>

<body>

<header>
<h1>JhatpatKart</h1>
<p>20 Minute Grocery Delivery in Bargarh</p>
</header>

<h2>Minimum Order ₹149</h2>
<h3>Free Delivery Above ₹249</h3>

<div class="products">

<div class="card">
<h3>Milk</h3>
<p>₹45</p>
<button>Add to Cart</button>
</div>

<div class="card">
<h3>Bread</h3>
<p>₹35</p>
<button>Add to Cart</button>
</div>

<div class="card">
<h3>Dahi</h3>
<p>₹50</p>
<button>Add to Cart</button>
</div>

</div>

</body>
</html>
